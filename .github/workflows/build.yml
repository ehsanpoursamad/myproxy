name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kivy/buildozer:latest
      options: --user buildozer
    steps:
      - uses: actions/checkout@v4
      
      - name: Fix permissions
        run: chown -R buildozer:buildozer /home/user/hostcwd
        
      - name: Build APK
        run: |
          cd /home/user/hostcwd
          buildozer android debug

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: personalvpn-apk
          path: /home/user/hostcwd/bin/*.apk

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-logs
          path: /home/user/hostcwd/.buildozer/logs/
