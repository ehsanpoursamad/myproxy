name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kivy/buildozer:latest
      env:
        BUILDOZER_WARN_ON_ROOT: 0
    steps:
      - uses: actions/checkout@v4

      - name: Accept Android SDK licenses
        run: |
          mkdir -p /github/home/.android
          echo -e "\n\nn\n" | sdkmanager --licenses 2>/dev/null || true
          yes | sdkmanager --licenses || true

      - name: Build APK
        run: buildozer android debug

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: personalvpn-apk
          path: bin/*.apk

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-logs
          path: .buildozer/logs/
