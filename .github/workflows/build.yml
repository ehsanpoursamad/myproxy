name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system deps
        run: |
          sudo apt update
          sudo apt install -y libffi-dev libssl-dev

      - name: Install Rust
        run: curl https://sh.rustup.rs -sSf | sh -s -- -y

      - name: Add Rust to PATH
        run: echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install Buildozer
        run: pip install buildozer

      - name: Build APK (capture full output)
        id: build
        run: |
          buildozer android debug 2>&1 | tee buildozer_full.log
        continue-on-error: true  # continue even if build fails

      - name: Upload full build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-build-log
          path: buildozer_full.log

      - name: Upload .buildozer directory
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-dir
          path: .buildozer/

      - name: Upload APK if exists
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: personalvpn-apk
          path: bin/*.apk
