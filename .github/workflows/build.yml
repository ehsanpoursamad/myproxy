name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kivy/kivy:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install additional dependencies
        run: |
          apt-get update
          apt-get install -y libffi-dev libssl-dev git

      - name: Install Buildozer
        run: pip install --upgrade buildozer cython

      - name: Build APK
        run: |
          cd ${{ github.workspace }}
          buildozer android debug

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: personalvpn-apk
          path: bin/*.apk

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-logs
          path: .buildozer/logs/
