name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  # Force actions to use Node.js 24 to eliminate deprecation warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y libffi-dev libssl-dev

      - name: Install Rust (required for cryptography)
        run: curl https://sh.rustup.rs -sSf | sh -s -- -y
        shell: bash

      - name: Add Rust to PATH
        run: echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer
          buildozer init

      - name: Build APK
        id: build
        continue-on-error: false
        run: |
          # Clean previous build artifacts to ensure a fresh build
          rm -rf .buildozer
          buildozer android debug

      - name: List output files
        run: |
          echo "Contents of bin directory:"
          ls -la bin/ || echo "bin directory does not exist"
          echo "Contents of .buildozer directory (if exists):"
          ls -la .buildozer/ || echo ".buildozer directory does not exist"

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: personalvpn-apk
          path: bin/*.apk
          if-no-files-found: error

      - name: Upload full buildozer logs (if APK missing)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-buildozer-logs
          path: .buildozer/
          if-no-files-found: ignore
